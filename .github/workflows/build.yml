name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v3

    - name: Install Verilator
      if: ${{ matrix.os == 'ubuntu-latest' }}
      run: >
        sudo apt-get install verilator

    - name: Versions
      run: |
        git version
        cargo version

    - name: Build
      run: cargo build

    # Only Ubuntu has verilator installed currently.
    - name: Run tests
      if: ${{ matrix.os == 'ubuntu-latest' }}
      run: cargo test
